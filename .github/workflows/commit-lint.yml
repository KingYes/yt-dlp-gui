name: Commit Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  commit-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Lint commits
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.sha }}"
          else
            echo "${{ github.event.head_commit.message }}" | npx commitlint
          fi
