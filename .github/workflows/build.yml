name: Release

on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      version:
        required: true
        type: string

env:
  TAG: ${{ inputs.version || github.ref_name }}

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows release
        shell: pwsh
        env:
          TAG: ${{ env.TAG }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./scripts/build_windows_release.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-gui-windows
          path: release-windows/

  build-unix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: yt-dlp-gui-macos
            exe_name: yt-dlp-gui
          - os: ubuntu-latest
            artifact: yt-dlp-gui-linux
            exe_name: yt-dlp-gui

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: bash
        run: |
          ICON_ARGS=""
          if [ -f assets/icon.ico ]; then
            ICON_ARGS="--icon assets/icon.ico"
          fi
          pyinstaller --noconfirm --onefile --windowed \
            --name "yt-dlp-gui" \
            $ICON_ARGS \
            --hidden-import PySide6 \
            --collect-submodules PySide6 \
            --collect-all src \
            --add-data "locales:locales" \
            --add-data "assets:assets" \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.exe_name }}

  release:
    needs: [build-windows, build-unix]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        env:
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          TAG="${{ env.TAG }}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -z "$PREV" ]; then
            LOG=$(git log --no-merges --format="%H %s" "$TAG")
          else
            LOG=$(git log --no-merges --format="%H %s" "${PREV}..${TAG}")
          fi
          BODY=$(echo "$LOG" \
            | grep -v -E ' (bump: v|CI: |Internal: |Revert: )' \
            | while read -r hash msg; do
                short=${hash:0:7}
                msg=$(echo "$msg" | sed "s|(#\([0-9]*\))|[#\1](${REPO_URL}/pull/\1)|g")
                echo "- [\`${short}\`](${REPO_URL}/commit/${hash}) ${msg}"
              done)
          {
            echo "body<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$BODY"
            if [ -n "$PREV" ]; then
              echo ""
              echo "**Full Changelog**: [\`${PREV}...${TAG}\`](${REPO_URL}/compare/${PREV}...${TAG})"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          VERSION="${TAG#v}"
          mv artifacts/yt-dlp-gui-macos/yt-dlp-gui artifacts/yt-dlp-gui-macos-bin
          mv artifacts/yt-dlp-gui-linux/yt-dlp-gui artifacts/yt-dlp-gui-linux-bin
          rmdir artifacts/yt-dlp-gui-macos artifacts/yt-dlp-gui-linux
          mv artifacts/yt-dlp-gui-macos-bin artifacts/yt-dlp-gui-macos
          mv artifacts/yt-dlp-gui-linux-bin artifacts/yt-dlp-gui-linux
          mkdir -p release-upload
          cp artifacts/yt-dlp-gui-windows/yt-dlp-gui-setup.exe release-upload/
          cp artifacts/yt-dlp-gui-windows/update-manifest.json release-upload/
          cp artifacts/yt-dlp-gui-windows/yt-dlp-gui-windows-app-"${VERSION}".zip release-upload/
          cp artifacts/yt-dlp-gui-macos release-upload/yt-dlp-gui-macos
          cp artifacts/yt-dlp-gui-linux release-upload/yt-dlp-gui-linux
        env:
          TAG: ${{ env.TAG }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            release-upload/yt-dlp-gui-setup.exe
            release-upload/update-manifest.json
            release-upload/yt-dlp-gui-windows-app-*.zip
            release-upload/yt-dlp-gui-macos
            release-upload/yt-dlp-gui-linux
