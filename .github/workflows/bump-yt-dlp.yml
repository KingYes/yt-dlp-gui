name: Bump yt-dlp

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      needs_bump: ${{ steps.check.outputs.needs_bump }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for newer yt-dlp
        id: check
        run: |
          latest=$(pip index versions yt-dlp 2>/dev/null | head -1 | sed 's/.*(\(.*\))/\1/')
          current=$(grep '^yt-dlp' requirements.txt | sed 's/.*>=\(.*\)/\1/')
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          if [ "$latest" != "$current" ]; then
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update requirements.txt
        if: steps.check.outputs.needs_bump == 'true'
        run: |
          sed -i "s/^yt-dlp>=.*/yt-dlp>=${{ steps.check.outputs.latest }}/" requirements.txt

      - name: Bump patch version
        id: version
        if: steps.check.outputs.needs_bump == 'true'
        run: |
          python - <<'PYEOF'
          import re
          from pathlib import Path

          path = Path("pyproject.toml")
          text = path.read_text()
          match = re.search(r'version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', text)
          major, minor, patch = match.groups()
          new_version = f"{major}.{minor}.{int(patch) + 1}"
          text = text.replace(match.group(0), f'version = "{new_version}"')
          path.write_text(text)
          print(f"Bumped version to {new_version}")

          import subprocess
          subprocess.run(
              ["bash", "-c", f'echo "version={new_version}" >> "$GITHUB_OUTPUT"'],
              check=True,
          )
          PYEOF

      - name: Update updater.py
        if: steps.check.outputs.needs_bump == 'true'
        run: |
          sed -i "s/^APP_VERSION = .*/APP_VERSION = \"${{ steps.version.outputs.version }}\"/" updater.py

      - name: Commit, tag, and push
        if: steps.check.outputs.needs_bump == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add requirements.txt pyproject.toml updater.py
          git commit -m "bump yt-dlp to ${{ steps.check.outputs.latest }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD "v${{ steps.version.outputs.version }}"

  release:
    needs: bump
    if: needs.bump.outputs.needs_bump == 'true'
    uses: ./.github/workflows/build.yml
    with:
      version: v${{ needs.bump.outputs.version }}
    permissions:
      contents: write
