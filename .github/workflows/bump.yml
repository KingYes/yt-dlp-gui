name: Bump Version & Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.new.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Read current version
        id: current
        run: |
          version=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Compute new version
        id: new
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          echo "version=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.new.outputs.version }}\"/" pyproject.toml

      - name: Update updater.py
        run: |
          sed -i "s/^APP_VERSION = .*/APP_VERSION = \"${{ steps.new.outputs.version }}\"/" updater.py

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml updater.py
          git commit -m "bump: v${{ steps.new.outputs.version }}"
          git tag "v${{ steps.new.outputs.version }}"
          git push origin HEAD "v${{ steps.new.outputs.version }}"

  release:
    needs: bump
    uses: ./.github/workflows/build.yml
    with:
      version: v${{ needs.bump.outputs.version }}
    permissions:
      contents: write
