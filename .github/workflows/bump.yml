name: Bump Version & Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.new.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Read current version
        id: current
        run: |
          version=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Compute new version
        id: new
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          echo "version=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.new.outputs.version }}\"/" pyproject.toml

      - name: Update updater.py
        run: |
          sed -i "s/^APP_VERSION = .*/APP_VERSION = \"${{ steps.new.outputs.version }}\"/" updater.py

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml updater.py
          git commit -m "bump: v${{ steps.new.outputs.version }}"
          git tag "v${{ steps.new.outputs.version }}"
          git push origin HEAD "v${{ steps.new.outputs.version }}"

  build:
    needs: bump
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: yt-dlp-gui-windows
            exe_name: yt-dlp-gui.exe
          - os: macos-latest
            artifact: yt-dlp-gui-macos
            exe_name: yt-dlp-gui
          - os: ubuntu-latest
            artifact: yt-dlp-gui-linux
            exe_name: yt-dlp-gui

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump.outputs.version }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: bash
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name "yt-dlp-gui" \
            --hidden-import customtkinter \
            --collect-data customtkinter \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.exe_name }}

  release:
    needs: [bump, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        env:
          REPO_URL: https://github.com/KingYes/yt-dlp-gui
        run: |
          TAG="v${{ needs.bump.outputs.version }}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -z "$PREV" ]; then
            LOG=$(git log --no-merges --format="%H %s" "$TAG")
          else
            LOG=$(git log --no-merges --format="%H %s" "${PREV}..${TAG}")
          fi
          BODY=$(echo "$LOG" \
            | grep -v -E ' (bump: v|CI: |Internal: |Revert: )' \
            | while read -r hash msg; do
                short=${hash:0:7}
                msg=$(echo "$msg" | sed "s|(#\([0-9]*\))|[#\1](${REPO_URL}/pull/\1)|g")
                echo "- [\`${short}\`](${REPO_URL}/commit/${hash}) ${msg}"
              done)
          {
            echo "body<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$BODY"
            if [ -n "$PREV" ]; then
              echo ""
              echo "**Full Changelog**: [\`${PREV}...${TAG}\`](${REPO_URL}/compare/${PREV}...${TAG})"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts with platform suffix
        run: |
          mv artifacts/yt-dlp-gui-windows/yt-dlp-gui.exe artifacts/yt-dlp-gui-windows.exe
          mv artifacts/yt-dlp-gui-macos/yt-dlp-gui artifacts/yt-dlp-gui-macos-bin
          mv artifacts/yt-dlp-gui-linux/yt-dlp-gui artifacts/yt-dlp-gui-linux-bin
          rmdir artifacts/yt-dlp-gui-macos artifacts/yt-dlp-gui-linux
          mv artifacts/yt-dlp-gui-macos-bin artifacts/yt-dlp-gui-macos
          mv artifacts/yt-dlp-gui-linux-bin artifacts/yt-dlp-gui-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump.outputs.version }}
          name: v${{ needs.bump.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/yt-dlp-gui-windows.exe
            artifacts/yt-dlp-gui-macos
            artifacts/yt-dlp-gui-linux
